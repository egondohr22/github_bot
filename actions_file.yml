name: My Bot

on:
  issue_comment:
    types: [created]

jobs:
  my-bot:
    if: contains(github.event.comment.body, '@ReviewPilot')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ github.event.issue.pull_request.url }}"
          if [ -z "$PR_URL" ] || [ "$PR_URL" = "null" ]; then
            echo "No PR info found, exiting."
            exit 1
          fi

          PR_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" "$PR_URL")
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r .head.ref)
          BASE_BRANCH=$(echo "$PR_DATA" | jq -r .base.ref)
          echo "head=$HEAD_BRANCH" >> $GITHUB_OUTPUT
          echo "base=$BASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Fetch branches for diff
        run: |
          git fetch origin ${{ steps.pr.outputs.base }}
          git fetch origin ${{ steps.pr.outputs.head }}

      - name: Build, sign and send payload
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          COMMENT="${{ github.event.comment.body }}"
          PR_NUMBER="${{ github.event.issue.number }}"
          BASE="${{ steps.pr.outputs.base }}"
          HEAD="${{ steps.pr.outputs.head }}"
          OWNER="${{ github.repository_owner }}"
          REPO="$OWNER/${{ github.event.repository.name }}"

          DIFF=$(git diff origin/$BASE...origin/$HEAD | head -n 500)

          PAYLOAD=$(jq -n \
            --arg pr "$PR_NUMBER" \
            --arg base "$BASE" \
            --arg head "$HEAD" \
            --arg comment "$COMMENT" \
            --arg diff "$DIFF" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            '{pr_number: $pr, base_branch: $base, head_branch: $head, comment: $comment, diff: $diff, owner: $owner, repo: $repo}')

          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

          curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
