name: My Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  my-bot:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@my-bot')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@my-bot')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@my-bot'))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ github.event.issue.pull_request.url || github.event.pull_request.url }}"
          if [ -z "$PR_URL" ] || [ "$PR_URL" = "null" ]; then
            echo "No PR info found, exiting."
            exit 1
          fi

          PR_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" "$PR_URL")
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r .head.ref)
          BASE_BRANCH=$(echo "$PR_DATA" | jq -r .base.ref)
          echo "head=$HEAD_BRANCH" >> $GITHUB_OUTPUT
          echo "base=$BASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Fetch branches for diff
        run: |
          git fetch origin ${{ steps.pr.outputs.base }}
          git fetch origin ${{ steps.pr.outputs.head }}

      - name: Send event to rails server
        id: send_to_server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="${{ github.event.comment.body || github.event.review.body }}"
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          BASE="${{ steps.pr.outputs.base }}"
          HEAD="${{ steps.pr.outputs.head }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          DIFF=$(git diff origin/$BASE...origin/$HEAD | head -n 500)

          # Use jq to properly escape JSON
          PAYLOAD=$(jq -n \
            --arg pr "$PR_NUMBER" \
            --arg base "$BASE" \
            --arg head "$HEAD" \
            --arg comment "$COMMENT" \
            --arg diff "$DIFF" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            '{pr_number: $pr, base_branch: $base, head_branch: $head, comment: $comment, diff: $diff, owner: $owner, repo: $repo}')

          RESPONSE=$(curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "server_response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post server response as comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_RESPONSE: ${{ steps.send_to_server.outputs.server_response }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          MESSAGE=$(echo "$SERVER_RESPONSE" | jq -r '.message')

          curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg body "$MESSAGE" '{body: $body}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments"